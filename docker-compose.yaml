name: test-task-cir

networks:
  cir-network:
    driver: bridge

services:
  cir-service:
    container_name: cir-service
    build:
      context: .
      dockerfile: Dockerfile.local
    depends_on:
      cir-database:
        condition: service_started
      cir-kafka:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - .:/usr/src/app
      - ./node_modules:/usr/src/app/node_modules
    restart: on-failure
    stop_signal: SIGTERM
    stop_grace_period: 30s
    ports:
      - "9000:9000"
    hostname: cir.service
    networks:
      - cir-network
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  cir-database:
    container_name: cir-database
    image: postgres:17.5
    restart: on-failure
    command: postgres -c 'max_connections=200'
    shm_size: 256mb
    env_file:
      - .env
    volumes:
      - ./db/cir-database:/var/lib/postgresql/data
    ports:
      - 5832:5432
    hostname: cir.database
    networks:
      - cir-network

  cir-kafka:
    container_name: cir-kafka
    image: apache/kafka:4.3.1
    restart: on-failure
    ports:
      - 9092:9092
    hostname: cir-kafka
    networks:
      - cir-network
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@cir-kafka:29093
      KAFKA_LISTENERS: INTERNAL://:19092,EXTERNAL://:9092,CONTROLLER://:29093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://cir-kafka:19092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 20s
    logging:
      options:
        max-size: "10m"
        max-file: "3"
